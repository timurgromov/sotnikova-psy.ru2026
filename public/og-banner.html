<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OG Banner</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 1200px;
        height: 630px;
        overflow: hidden;
        background: #f7f2ea;
      }

      body {
        display: grid;
        place-items: center;
      }

      img {
        display: block;
        width: 1200px;
        height: 630px;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <img src="../photos-review/photo_messenger.jpg" alt="OG banner" />
  </body>
</html>
