<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OG Banner</title>
    <style>
      :root {
        --bg: #fcf8f2;
        --bg-2: #f4efe6;
        --text: #2e2c28;
        --muted: #6f6a63;
        --accent: #9db9a8;
        --accent-soft: #dbe8e0;
        --accent-warm: #eadfd0;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 1200px;
        height: 717px;
        overflow: hidden;
        background:
          radial-gradient(circle at 10% 12%, rgba(234, 223, 208, 0.52), transparent 28%),
          radial-gradient(circle at 88% 86%, rgba(219, 232, 224, 0.64), transparent 22%),
          linear-gradient(135deg, var(--bg) 0%, var(--bg-2) 100%);
      }

      body {
        font-family: Manrope, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .canvas {
        position: relative;
        width: 1200px;
        height: 717px;
        padding: 72px 88px;
        background:
          radial-gradient(circle at 10% 12%, rgba(234, 223, 208, 0.52), transparent 28%),
          radial-gradient(circle at 88% 86%, rgba(219, 232, 224, 0.64), transparent 22%),
          linear-gradient(135deg, var(--bg) 0%, var(--bg-2) 100%);
      }

      .ring {
        position: absolute;
        top: 42px;
        right: 110px;
        width: 136px;
        height: 136px;
        border-radius: 50%;
        background: rgba(219, 232, 224, 0.7);
      }

      .ring::after {
        content: "";
        position: absolute;
        inset: 28px;
        border-radius: 50%;
        background: rgba(157, 185, 168, 0.4);
      }

      .eyebrow {
        color: #5b615d;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0.08em;
        margin: 18px 0 36px;
      }

      h1 {
        margin: 0;
        max-width: 640px;
        color: var(--text);
        font-size: 58px;
        line-height: 1.04;
        font-weight: 800;
      }

      .sub {
        margin-top: 28px;
        color: var(--muted);
        font-size: 26px;
        line-height: 1.35;
        font-weight: 600;
      }

      .sub strong {
        color: #5f776b;
        font-weight: 700;
      }

      .footer {
        margin-top: 18px;
        padding-top: 16px;
        width: 270px;
        border-top: 3px solid var(--accent);
        color: #8a857c;
        font-size: 21px;
        font-weight: 600;
      }

      .photo-wrap {
        position: absolute;
        right: 96px;
        bottom: 118px;
        width: 328px;
        height: 524px;
        border-radius: 36px;
        overflow: hidden;
        background: #fff;
        box-shadow: 0 14px 40px rgba(57, 57, 50, 0.14);
      }

      .photo {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center 8%;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="canvas">
      <div class="ring"></div>

      <div class="eyebrow">АНАСТАСИЯ СОТНИКОВА</div>
      <h1>Психолог по расстройствам пищевого поведения</h1>
      <div class="sub">
        <div>Доказательный подход</div>
        <strong>Бережная работа онлайн</strong>
      </div>
      <div class="footer">Онлайн-консультации</div>

      <div class="photo-wrap">
        <img class="photo" src="./social-photo.jpeg" alt="Анастасия Сотникова" />
      </div>
    </div>
  </body>
</html>
